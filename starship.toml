# Starship Configuration
# Optimized for speed and clarity
# Documentation: https://starship.rs/config/

# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Timeout for starship to scan files (milliseconds)
scan_timeout = 30
command_timeout = 2000

# Format string
format = """$directory$git_branch$git_status$character"""

# Disable the blank line at the start of the prompt
add_newline = false

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[username]
style_user = "bold blue"
style_root = "bold red"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = "on [$hostname](bold yellow) "
disabled = false

[directory]
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold cyan"
read_only = " 🔒"

[git_branch]
symbol = ""
format = "[git:\\([${branch}]($style)\\)](bold blue) "
style = "bold red"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold yellow"
conflicted = "󰞇"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "󰹺${ahead_count}⇣${behind_count}"
up_to_date = "✓"
untracked = "󰋗"
stashed = ""
modified = ""
staged = ''
renamed = "󰑕"
deleted = ""


[golang]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold cyan"

[nodejs]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold green"

[python]
symbol = " "
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "yellow"

[rust]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold red"

[docker_context]
symbol = " "
format = "via [$symbol$context]($style) "
style = "blue bold"
disabled = false

[package]
symbol = " "
disabled = false

[time]
disabled = true
format = '🕙[\[ $time \]]($style) '
time_format = "%T"
style = "bold white"

[cmd_duration]
min_time = 500
format = "took [$duration](bold yellow) "
